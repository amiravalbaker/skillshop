{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h2 class="text-center mb-4 fw-bold">Create Account</h2>

          <form class="signup" method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            <div class="mb-3 custom-form text-dark">
              {{ form.as_p }}
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary py-2">Sign Up</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

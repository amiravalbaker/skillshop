{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
          <h4 class="fw-bold mb-3">Password Reset</h4>
          <p class="text-muted small mb-4">Forgotten your password? Enter your e-mail address below, and we'll send you an e-mail to reset it.</p>
          
          <form method="post" action="{% url 'account_reset_password' %}" class="password_reset">
            {% csrf_token %}
            <div class="mb-3 custom-form text-start">
              {{ form.as_p }}
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Reset My Password</button>
            </div>
          </form>
          
          <p class="mt-4 mb-0 small">
            <a href="{% url 'account_login' %}" class="text-decoration-none text-primary">Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
